<html lang="ja">
<head>

  <title>設えメーカー</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: #f7f2eb;
      color: #6f5a4e;
      overflow: hidden;
    }

.screen {
  width: 100vw;
  height: 100vh;
  display: none;
  position: relative;
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;   /* cover → contain */
  background-color: #f7f2eb;  /* 余白色 */
}

#screen-title {
  background-image: url("assets/bg-title.png");
}

#screen-layout {
  background-image: none;
  background-color: #f7f2eb;
}

#screen-confirm {
  background-image: none;
  background-color: #f7f2eb;
}

    .screen.active {
      display: block;
    }

    .soft-card {
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(224, 213, 199, 0.8);
      border-radius: 28px;
      box-shadow: 0 4px 12px rgba(120, 100, 80, 0.08);
      backdrop-filter: blur(2px);
    }

    .title-logo {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(36px, 5vw, 72px);
      font-weight: bold;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .title-logo .blue {
      color: #77aee4;
    }

    .title-logo .green {
      color: #a4d28d;
    }

    .speech {
      position: absolute;
      border: 4px solid #ecd6bb;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      color: #b0866a;
      line-height: 1.6;
      box-shadow: 0 4px 10px rgba(150, 120, 90, 0.06);
    }

    .speech::after {
      content: "";
      position: absolute;
      right: -22px;
      bottom: 34px;
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.82);
      border-right: 4px solid #ecd6bb;
      border-bottom: 4px solid #ecd6bb;
      transform: rotate(-20deg);
      border-bottom-right-radius: 10px;
    }

    .kuma {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8eb7e4;
      user-select: none;
    }

    .kuma-face {
      position: relative;
      width: 100%;
      height: 100%;
      border: 8px solid #a7cbee;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
    }

    .kuma-face::before,
    .kuma-face::after {
      content: "";
      position: absolute;
      top: -18px;
      width: 34px;
      height: 34px;
      border: 7px solid #f0b9d2;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
    }

    .kuma-face::before {
      left: 10px;
    }

    .kuma-face::after {
      right: 10px;
    }

    .kuma-eyes {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 24px;
      font-size: 22px;
      color: #6f5a4e;
    }

    .kuma-nose {
      position: absolute;
      top: 54%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 12px;
      background: #6f86d9;
      border-radius: 50% 50% 60% 60%;
    }

    .kuma-cheek {
      position: absolute;
      top: 56%;
      width: 20px;
      height: 20px;
      background: rgba(255, 191, 191, 0.5);
      border-radius: 50%;
    }

    .kuma-cheek.left {
      left: 18%;
    }

    .kuma-cheek.right {
      right: 18%;
    }

    .kuma-smile {
      position: absolute;
      top: 64%;
      left: 50%;
      width: 34px;
      height: 18px;
      transform: translateX(-50%);
      border-bottom: 4px solid #78b7d8;
      border-radius: 0 0 30px 30px;
    }

    .main-btn {
  border: none;
  border-radius: 999px;
  padding: 16px 40px;
  font-size: clamp(20px, 2vw, 34px);
  font-weight: bold;

  color: white;
  background: linear-gradient(to bottom, #bce8b1, #98d698);
  box-shadow: 0 6px 10px rgba(120, 150, 120, 0.18);
}
    

    .sub-btn {
      border: none;

      padding: 18px 36px;
      font-size: clamp(22px, 2vw, 34px);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.75);
      color: #7b6558;
      box-shadow: 0 6px 10px rgba(120, 100, 80, 0.08);

    #screen-title .kuma {

    }

#screen-title .start-wrap {

}

    /* ---------- 2ページ目 ---------- */
    .layout-wrap {

 .side-panel {

.item-button {

    .workspace-area {

.layout-canvas-wrap {

    .hint-speech {

    .layout-kuma {

    .top-buttons {

    .small-pill {

    /* 家具 */
 .furniture {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f8f8f8;

    .furniture.selected {

    .furniture.door {

.furniture.toilet {
  background: transparent !important;
  border: none !important;
  overflow: visible;   /* ← 文字を外に出せるようにする */
}

.toilet-body {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
}

.toilet-icon {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.toilet-label {
  position: absolute;
  left: 50%;
  top: calc(100% + 2px);   /* ← 箱の外に出す */
  transform: translateX(-50%);
  font-size: 16px;
  font-weight: bold;
  color: #6f5a4e;
  white-space: nowrap;
  pointer-events: none;
}

.toilet-icon path {
  fill: none;
  stroke: #555;
  stroke-width: 8;
  stroke-linejoin: round;
  stroke-linecap: round;
}


    .furniture.window {
      background: #f0f7ff;
      border-color: #94b5df;
    }

    .furniture.bed {
      background: #fcfcfc;
    }

    /* ベッドの冊 */
    .bed-rail {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #b89f8d;
      border-radius: 3px;
    }

    .bed-rail.hidden {
      display: none;
    }

    .controls {
      position: absolute;
      display: none;
      z-index: 20;
      pointer-events: none;
    }

    .controls.show {
      display: block;
    }

    .control-btn {
      position: absolute;
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: rgba(255,255,255,0.95);
      color: #8fb0e0;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(120, 100, 80, 0.12);
      cursor: pointer;
      pointer-events: auto;
    }

    .control-delete {
      color: #f09aa0;
    }

    .bed-rail-panel {
  position: absolute;
  left: 32%;
  top: 70%;
  width: 38%;
  padding: 12px 16px;
  display: none;
  z-index: 20;
}

    .bed-rail-panel.show {
      display: block;
    }

    .bed-rail-title {
  font-size: 18px;
  margin-bottom: 10px;
  color: #7b6558;
  font-weight: bold;
}

 .bed-rail-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-items: start;
}
.furniture.bed {
  background: #fff;
  border: 3px solid #222;
  position: absolute;
  overflow: visible;
}
.bed-rail-buttons + .bed-rail-buttons {
  margin-top: 10px;
}
.bed-label {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  font-weight: bold;
  color: #444;
  white-space: nowrap;
  pointer-events: none;
}

.bed-rail {
  position: absolute;
  background: #111;
}

.bed-rail.hidden {
  display: none;
}

.bed-pillow {
  position: absolute;
  width: 34px;
  height: 18px;
  border: 3px solid #222;
  background: #fff;
  box-sizing: border-box;
}

/* 柵の共通 */
.bed-rail {
  position: absolute;
  background: #111;
}

.bed-rail.hidden {
  display: none;
}

/* 直線柵：縦 */
.bed-rail.v-rail {
  width: 8px;
}

/* 直線柵：横 */
.bed-rail.h-rail {
  height: 8px;
}

/* L字の共通 */
.bed-rail.lshape {
  width: 0;
  height: 0;
  background: transparent;
}

.bed-rail.lshape::before,
.bed-rail.lshape::after {
  content: "";
  position: absolute;
  background: #111;
}
.bed-rail.lshape::before {
  width: 8px;
  height: var(--v);
  left: 0;
  top: 0;
}

.bed-rail.lshape::after {
  width: var(--h);
  height: 8px;
  left: var(--hx);
  top: var(--hy);
}

 .confirm-inner {

border-radius: 12px;

    .confirm-kuma {

  .confirm-buttons {

function updateToiletSymbol(item) {

    function getFurnitureConfig(type) {
      switch (type) {
        case 'テレビ':
  return { width: 120, height: 50, label: 'テレビ', className: 'tv' };
        case 'テーブル':
          return { width: 120, height: 70, label: 'テーブル' };
        case 'イス':
  　　　　　return { width: 60, height: 60, label: 'イス' };
　　　　　case '車椅子':
  　　　　　return { width: 60, height: 60, label: '車椅子' };
　　　　　case '歩行器':
  　　　　　return { width: 60, height: 60, label: '歩行器' };
        case 'タンス':
          return { width: 80, height: 120, label: 'タンス' };
        case 'ドア':
  　　　　　　return { width: 110, height: 86, label: 'ドア', className: 'door' };
        case 'トイレ':
  return { width: 96, height: 106, label: 'トイレ', className: 'toilet' };
  　　　　　　return { width: 110, height: 86, label: '窓', className: 'window' };
        case 'ベッド':
          return { width: 120, height: 180, label: 'ベッド', className: 'bed' };
        default:
          return { width: 90, height: 60, label: type };
      }
    }

    function selectItem(item) {
      document.querySelectorAll('.furniture').forEach(el => el.classList.remove('selected'));
      selectedItem = item;
      item.classList.add('selected');
      updateControls();
      updateBedRailPanel();
    }

    function clearSelection() {
      document.querySelectorAll('.furniture').forEach(el => el.classList.remove('selected'));
      selectedItem = null;
      selectionControls.classList.remove('show');
      bedRailPanel.classList.remove('show');
    }

   function updateControls() {
  if (!selectedItem) {
    selectionControls.classList.remove('show');
    return;
  }

  const itemRect = selectedItem.getBoundingClientRect();
  const canvasRect = layoutCanvas.getBoundingClientRect();

  const left = itemRect.left - canvasRect.left;
  const top = itemRect.top - canvasRect.top;
  const width = itemRect.width;
  const height = itemRect.height;

  const canvasWidth = layoutCanvas.clientWidth;
  const canvasHeight = layoutCanvas.clientHeight;

  selectionControls.classList.add('show');

  selectionControls.style.left = left + 'px';
  selectionControls.style.top = top + 'px';

  let deleteTop = -18;

function rotateSelected(e) {

  if (type === 'ベッド') {

  }

  let rotation = parseInt(selectedItem.dataset.rotation || '0', 10);

  if (
    type === 'テレビ' ||
    type === 'テーブル' ||
    type === 'イス' ||
    type === '車椅子' ||
    type === '歩行器' ||
    type === 'トイレ'
  ) {
    rotation = (rotation + 45) % 360;
  } else {
    rotation = (rotation + 90) % 360;
  }

  selectedItem.dataset.rotation = rotation;

if (
  type === 'ドア' ||
  type === '窓'
) {
  selectedItem.style.transform = 'none';
} else {
  selectedItem.style.transform = `rotate(${rotation}deg)`;
}

  const baseWidth = parseFloat(selectedItem.dataset.baseWidth);

function rotateBed(item) {

  rotation = (rotation + 90) % 360;

  item.dataset.rotation = rotation;
  item.style.transform = `rotate(${rotation}deg)`;

  const baseWidth = parseFloat(item.dataset.baseWidth);
  const baseHeight = parseFloat(item.dataset.baseHeight);
  const scale = parseFloat(item.dataset.scale || '1');

  item.style.width = (baseWidth * scale) + 'px';
  item.style.height = (baseHeight * scale) + 'px';

function updateChairText(item) {

function resizeSelected(rate, e) {

let naturalWidth = baseWidth;
let naturalHeight = baseHeight;

selectedItem.style.width = (naturalWidth * scale) + 'px';

  keepItemInsideCanvas(selectedItem);
updateToiletSymbol(selectedItem);

 function applyTransform(item) {
  item.style.transform = 'none';
}



function getVisualSize(item) {
  const type = item.dataset.type;
  const rotation = parseInt(item.dataset.rotation || '0', 10);
  const width = parseFloat(item.style.width) || item.offsetWidth;
  const height = parseFloat(item.style.height) || item.offsetHeight;

  // ドア・窓は外側を回してないので、そのままの大きさでOK
  if (type === 'ドア' || type === '窓') {
    return { width, height };
  }

  // 90度・270度のときは見た目の幅高さが入れ替わる
  if (rotation === 90 || rotation === 270) {
    return {
      width: height,
      height: width
    };
  }

  return { width, height };
}
function getVisualOffset(item) {
  const canvasRect = layoutCanvas.getBoundingClientRect();
  const itemRect = item.getBoundingClientRect();

  const styledLeft = parseFloat(item.style.left) || 0;
  const styledTop = parseFloat(item.style.top) || 0;

  return {
    offsetLeft: (itemRect.left - canvasRect.left) - styledLeft,
    offsetTop: (itemRect.top - canvasRect.top) - styledTop
  };
}
function keepItemInsideCanvas(item) {
  const visualSize = getVisualSize(item);
  const { offsetLeft, offsetTop } = getVisualOffset(item);

  let left = parseFloat(item.style.left) || 0;
  let top = parseFloat(item.style.top) || 0;

  const minLeft = -offsetLeft;
  const minTop = -offsetTop;
  const maxLeft = layoutCanvas.clientWidth - visualSize.width - offsetLeft;
  const maxTop = layoutCanvas.clientHeight - visualSize.height - offsetTop;

  left = Math.max(minLeft, Math.min(left, maxLeft));
  top = Math.max(minTop, Math.min(top, maxTop));

  item.style.left = left + 'px';
  item.style.top = top + 'px';
}

    function updateBedRailPanel() {
      if (selectedItem && selectedItem.dataset.type === 'ベッド') {
        bedRailPanel.classList.add('show');
      } else {
        bedRailPanel.classList.remove('show');
      }
    }

  function toggleBedRail(position) {
  if (!selectedItem || selectedItem.dataset.type !== 'ベッド') return;

  const rail = getBedRail(selectedItem, position);
  if (!rail) return;

  const willShow = rail.classList.contains('hidden');

  if (willShow) {
    rail.classList.remove('hidden');

    // 👇ここ追加（毎回リセット）
    rail.dataset.shape = 'straight';

  } else {
    rail.classList.add('hidden');
  }

  updateBedRails(selectedItem);
}

function setBedRailShape(position, shape) {
  if (!selectedItem || selectedItem.dataset.type !== 'ベッド') return;

  const rail = getBedRail(selectedItem, position);
  if (!rail) return;

  rail.classList.remove('hidden');
  rail.dataset.shape = shape;

  updateBedRails(selectedItem);
}

function getBedRail(bed, position) {
  if (position === 'left-top') return bed.querySelector('.rail-lt');
  if (position === 'right-top') return bed.querySelector('.rail-rt');
  if (position === 'left-bottom') return bed.querySelector('.rail-lb');
  if (position === 'right-bottom') return bed.querySelector('.rail-rb');
  return null;
}

async function saveAsImage() {
  clearSelection();

  const target = document.getElementById('confirmInner');
  if (!target) return;

  const canvas = await html2canvas(target, {
    backgroundColor: "#ffffff",
    scale: 1
  });

  // 保存用は小さめにする
  const smallCanvas = document.createElement('canvas');
  const maxWidth = 420;   // ← 家系図アプリっぽい小さめ感
  const scale = maxWidth / canvas.width;

  smallCanvas.width = Math.round(canvas.width * scale);
  smallCanvas.height = Math.round(canvas.height * scale);

  const ctx = smallCanvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, smallCanvas.width, smallCanvas.height);
  ctx.drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);

  const link = document.createElement('a');
  link.download = 'layout.png';
  link.href = smallCanvas.toDataURL('image/png');
  link.click();

  setHintText('画像を保存したよ！');
}
    function startDragMouse(e) {
  if (e.target.closest('.bed-rail')) return;
  e.preventDefault();
  e.stopPropagation();

  const item = e.currentTarget;
  selectItem(item);

  const rect = layoutCanvas.getBoundingClientRect();
  const itemRect = item.getBoundingClientRect();

  const offsetX = e.clientX - itemRect.left;
  const offsetY = e.clientY - itemRect.top;

  function moveAt(clientX, clientY) {
    let visualLeft = clientX - rect.left - offsetX;
    let visualTop = clientY - rect.top - offsetY;

    const visualSize = getVisualSize(item);
    const { offsetLeft, offsetTop } = getVisualOffset(item);

    const minLeft = -offsetLeft;
    const minTop = -offsetTop;
    const maxLeft = layoutCanvas.clientWidth - visualSize.width - offsetLeft;
    const maxTop = layoutCanvas.clientHeight - visualSize.height - offsetTop;

    let left = visualLeft - offsetLeft;
    let top = visualTop - offsetTop;

    left = Math.max(minLeft, Math.min(left, maxLeft));
    top = Math.max(minTop, Math.min(top, maxTop));

    item.style.left = left + 'px';
    item.style.top = top + 'px';
    updateControls();
  }

  function onMouseMove(ev) {
    moveAt(ev.clientX, ev.clientY);
  }

  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}
    function startDragTouch(e) {
  if (e.target.closest('.bed-rail')) return;
  e.preventDefault();
  e.stopPropagation();

  const item = e.currentTarget;
  selectItem(item);

  const touch = e.touches[0];
  const rect = layoutCanvas.getBoundingClientRect();
  const itemRect = item.getBoundingClientRect();

  const offsetX = touch.clientX - itemRect.left;
  const offsetY = touch.clientY - itemRect.top;

  function onTouchMove(ev) {
    const t = ev.touches[0];

    let visualLeft = t.clientX - rect.left - offsetX;
    let visualTop = t.clientY - rect.top - offsetY;

    const visualSize = getVisualSize(item);
    const { offsetLeft, offsetTop } = getVisualOffset(item);

    const minLeft = -offsetLeft;
    const minTop = -offsetTop;
    const maxLeft = layoutCanvas.clientWidth - visualSize.width - offsetLeft;
    const maxTop = layoutCanvas.clientHeight - visualSize.height - offsetTop;

    let left = visualLeft - offsetLeft;
    let top = visualTop - offsetTop;

    left = Math.max(minLeft, Math.min(left, maxLeft));
    top = Math.max(minTop, Math.min(top, maxTop));

    item.style.left = left + 'px';
    item.style.top = top + 'px';
    updateControls();
  }



      function onTouchEnd() {
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
      }

      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    }
